name: Update Sheet Platforms
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Run sheet updater
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python sheet_updater.py
      - name: Commit platforms.json
        run: |
          git config user.name "job-agent-bot"
          git config user.email "bot@users.noreply.github.com"
          git add platforms.json
          git diff --cached --quiet || git commit -m "Update platform detection"
          git push
