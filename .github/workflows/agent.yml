name: Job Agent

on:
  schedule:
    # 3x daily at 08:00, 14:00, 20:00 IST (02:30, 08:30, 14:30 UTC)
    - cron: '30 2,8,14 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests beautifulsoup4 rapidfuzz playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run agent
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python job_agent.py

      - name: Commit seen_jobs.json
        run: |
          git config user.name "job-agent-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen_jobs.json
          git diff --cached --quiet || git commit -m "Update seen jobs"
          git push
